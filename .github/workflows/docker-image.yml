name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

  build-and-push:
    name: Build, Scan, Sign & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # keyless cosign signing via GitHub OIDC
    env:
      IMAGE: ${{ secrets.DOCKER_USERNAME || 'local' }}/home-backend
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1) Build the image locally so we can scan it before anything is pushed
      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2) Fail the build on FIXABLE High/Critical vulnerabilities
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Login to Docker Hub
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3) Push (cached — near-instant); capture the digest for signing
      - name: Push image
        id: push
        if: env.PUSH == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha

      # 4) Sign the pushed image by digest (keyless: no private key to manage)
      - name: Install cosign
        if: env.PUSH == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: env.PUSH == 'true'
        run: cosign sign --yes "${IMAGE}@${{ steps.push.outputs.digest }}"
